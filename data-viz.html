    />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
      .dv-wrap {
        max-width: 900px;
        margin: 0 auto;
      }
      .dv-chart-card {
        position: relative;
        min-height: 320px;
        padding: 18px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--panel);
      }
      .dv-loading,
      .dv-error,
      .dv-empty {
        display: grid;
        place-items: center;
        min-height: 280px;
        text-align: center;
        padding: 20px;
        color: var(--muted);
      }
      .dv-error strong {
        color: #f87171;
      }
      .dv-meta {
        margin-top: 14px;
        font-size: 13px;
        color: var(--muted);
      }
      .dv-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <canvas class="fx-canvas" aria-hidden="true"></canvas>
    <div class="cursor-glow" aria-hidden="true"></div>
    <div class="scroll-progress" aria-hidden="true">
      <div class="scroll-progress-bar"></div>
    </div>

    <a class="skip-link" href="#content">跳到主要內容</a>

    <header class="site-header" id="top">
      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="回到首頁">
          <span class="brand-mark" aria-hidden="true">◆</span>
          <span class="brand-text">你的名字</span>
        </a>
        <nav class="nav" aria-label="主要導覽">
          <button
            class="nav-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="nav-menu"
          >
            <span class="nav-toggle-icon" aria-hidden="true"></span>
            <span class="sr-only">開啟/關閉選單</span>
          </button>
          <div class="nav-menu" id="nav-menu">
            <a class="nav-link" href="about.html">關於我</a>
            <a class="nav-link" href="index.html#skills">技能</a>
            <a class="nav-link" href="index.html#projects">作品</a>
            <a class="nav-link" href="index.html#timeline">經歷</a>
            <a class="nav-link" href="index.html#contact">聯絡</a>
            <a class="nav-link" href="games.html">遊戲集</a>
          </div>
        </nav>
        <div class="header-actions">
          <button class="theme-toggle" type="button" aria-label="切換深色模式">
            <span class="theme-toggle-icon" aria-hidden="true"></span>
          </button>
          <a class="btn btn-primary" href="index.html#contact">合作邀約</a>
        </div>
      </div>
    </header>

    <main id="content">
      <section class="hero section">
        <div class="container">
          <div class="hero-copy reveal">
            <p class="badge"><span class="dot" aria-hidden="true"></span> 作品 C</p>
            <h1 class="hero-title">資料視覺化儀表板</h1>
            <p class="hero-subtitle">
              使用 <strong>Fetch</strong> 取得公開測試 API（JSONPlaceholder）的文章資料，統計各使用者的文章數量，以
              <strong>Chart.js</strong> 長條圖呈現；含載入中、錯誤重試與空資料示範。
            </p>
            <div class="hero-cta">
              <a class="btn btn-primary" href="#viz">查看圖表</a>
              <a class="btn btn-ghost" href="index.html#projects">回到作品</a>
            </div>
          </div>
        </div>
      </section>

      <section class="section" id="viz">
        <div class="container dv-wrap">
          <header class="section-head reveal">
            <h2 class="section-title">各使用者文章數（範例）</h2>
            <p class="section-desc">
              API：<code>jsonplaceholder.typicode.com/posts</code>。僅作教學／展示用途。
            </p>
          </header>

          <div class="dv-controls reveal">
            <button type="button" class="btn btn-primary" id="dv-reload">重新載入資料</button>
            <button type="button" class="btn btn-ghost" id="dv-empty-demo">示範：空資料狀態</button>
          </div>

          <div class="dv-chart-card reveal">
            <div class="dv-loading" id="dv-loading">
              <p>載入中…</p>
            </div>
            <div class="dv-error" id="dv-error" hidden>
              <p>
                <strong>載入失敗</strong><br />
                <span id="dv-error-msg"></span>
              </p>
              <button type="button" class="btn btn-primary" id="dv-retry" style="margin-top: 12px">
                重試
              </button>
            </div>
            <div class="dv-empty" id="dv-empty" hidden>
              <p>目前為<strong>空資料</strong>狀態（示範用）。按「重新載入資料」可恢復圖表。</p>
            </div>
            <div id="dv-canvas-wrap" hidden style="position: relative; height: 280px">
              <canvas id="dv-chart" aria-label="長條圖"></canvas>
            </div>
            <p class="dv-meta" id="dv-meta" hidden></p>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="muted">© <span data-year></span> 你的名字 · 作品 C 資料視覺化</p>
        <p class="muted"><a class="link" href="index.html">回首頁</a></p>
      </div>
    </footer>

    <script>
      (() => {
        const API = "https://jsonplaceholder.typicode.com/posts";
        let chart = null;

        const el = (id) => document.getElementById(id);
        const loading = el("dv-loading");
        const errBox = el("dv-error");
        const errMsg = el("dv-error-msg");
        const emptyBox = el("dv-empty");
        const canvasWrap = el("dv-canvas-wrap");
        const meta = el("dv-meta");
        const canvas = el("dv-chart");

        const show = (which) => {
          loading.hidden = which !== "loading";
          errBox.hidden = which !== "error";
          emptyBox.hidden = which !== "empty";
          canvasWrap.hidden = which !== "chart";
          meta.hidden = which !== "chart";
        };

        const palette = [
          "rgba(124, 92, 255, 0.85)",
          "rgba(57, 208, 255, 0.85)",
          "rgba(45, 212, 191, 0.85)",
          "rgba(251, 191, 36, 0.85)",
          "rgba(248, 113, 113, 0.85)",
          "rgba(167, 139, 250, 0.85)",
          "rgba(56, 189, 248, 0.85)",
          "rgba(52, 211, 153, 0.85)",
          "rgba(251, 146, 60, 0.85)",
          "rgba(244, 114, 182, 0.85)",
        ];

        async function fetchPosts() {
          const res = await fetch(`${API}?_limit=100`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.json();
        }

        function aggregate(posts) {
          const counts = {};
          posts.forEach((p) => {
            const u = p.userId;
            counts[u] = (counts[u] || 0) + 1;
          });
          const ids = Object.keys(counts)
            .map(Number)
            .sort((a, b) => a - b);
          return {
            labels: ids.map((id) => `使用者 ${id}`),
            data: ids.map((id) => counts[id]),
          };
        }

        function renderChart(labels, data) {
          const ctx = canvas.getContext("2d");
          if (chart) chart.destroy();
          chart = new Chart(ctx, {
            type: "bar",
            data: {
              labels,
              datasets: [
                {
                  label: "文章數",
                  data,
                  backgroundColor: labels.map((_, i) => palette[i % palette.length]),
                  borderWidth: 0,
                  borderRadius: 8,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: false },
              },
              scales: {
                x: {
                  ticks: { color: "#94a3b8", maxRotation: 45 },
                  grid: { color: "rgba(148, 163, 184, 0.15)" },
                },
                y: {
                  beginAtZero: true,
                  ticks: { stepSize: 1, color: "#94a3b8" },
                  grid: { color: "rgba(148, 163, 184, 0.15)" },
                },
              },
            },
          });
        }

        async function loadData() {
          show("loading");
          try {
            const posts = await fetchPosts();
            if (!posts.length) {
              show("empty");
              return;
            }
            const { labels, data } = aggregate(posts);
            meta.textContent = `已載入 ${posts.length} 筆文章，統計 ${labels.length} 位使用者。`;
            show("chart");
            renderChart(labels, data);
          } catch (e) {
            errMsg.textContent = e.message || String(e);
            show("error");
          }
        }

        el("dv-reload").addEventListener("click", () => loadData());
        el("dv-retry").addEventListener("click", () => loadData());
        el("dv-empty-demo").addEventListener("click", () => {
          if (chart) {
            chart.destroy();
            chart = null;
          }
          show("empty");
        });

        loadData();
      })();
    </script>
  </body>
</html>
