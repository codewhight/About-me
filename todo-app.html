<!doctype html>
<html lang="zh-Hant" data-theme="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="作品 B：待辦清單 — LocalStorage、篩選、排序、CRUD"
    />
    <title>待辦清單｜作品 B</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./script.js"></script>
    <style>
      .todo-wrap {
        max-width: 640px;
        margin: 0 auto;
      }
      .todo-form {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .todo-input {
        flex: 1 1 200px;
        padding: 11px 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        font: inherit;
      }
      .todo-input:focus {
        outline: none;
        box-shadow: var(--focus);
      }
      .todo-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin-bottom: 12px;
      }
      .todo-filters {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .todo-filters button {
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
      }
      .todo-filters button.is-on {
        background: linear-gradient(
          135deg,
          rgba(124, 92, 255, 0.35),
          rgba(57, 208, 255, 0.2)
        );
        color: var(--text);
        border-color: rgba(124, 92, 255, 0.4);
      }
      .todo-sort {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--muted);
      }
      .todo-sort select {
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        font: inherit;
      }
      .todo-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .todo-item {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 10px;
        align-items: center;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: var(--panel);
      }
      .todo-item.done .todo-text {
        text-decoration: line-through;
        opacity: 0.65;
      }
      .todo-text {
        cursor: pointer;
        word-break: break-word;
      }
      .todo-del {
        padding: 6px 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        cursor: pointer;
      }
      .todo-del:hover {
        color: #f87171;
        border-color: rgba(248, 113, 113, 0.5);
      }
      .todo-empty {
        text-align: center;
        padding: 28px 16px;
        color: var(--muted);
        border: 1px dashed var(--border);
        border-radius: 14px;
      }
      .todo-empty strong {
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <canvas class="fx-canvas" aria-hidden="true"></canvas>
    <div class="cursor-glow" aria-hidden="true"></div>
    <div class="scroll-progress" aria-hidden="true">
      <div class="scroll-progress-bar"></div>
    </div>

    <a class="skip-link" href="#content">跳到主要內容</a>

    <header class="site-header" id="top">
      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="回到首頁">
          <span class="brand-mark" aria-hidden="true">◆</span>
          <span class="brand-text">你的名字</span>
        </a>
        <nav class="nav" aria-label="主要導覽">
          <button
            class="nav-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="nav-menu"
          >
            <span class="nav-toggle-icon" aria-hidden="true"></span>
            <span class="sr-only">開啟/關閉選單</span>
          </button>
          <div class="nav-menu" id="nav-menu">
            <a class="nav-link" href="about.html">關於我</a>
            <a class="nav-link" href="index.html#skills">技能</a>
            <a class="nav-link" href="index.html#projects">作品</a>
            <a class="nav-link" href="index.html#timeline">經歷</a>
            <a class="nav-link" href="index.html#contact">聯絡</a>
            <a class="nav-link" href="games.html">遊戲集</a>
          </div>
        </nav>
        <div class="header-actions">
          <button class="theme-toggle" type="button" aria-label="切換深色模式">
            <span class="theme-toggle-icon" aria-hidden="true"></span>
          </button>
          <a class="btn btn-primary" href="index.html#contact">合作邀約</a>
        </div>
      </div>
    </header>

    <main id="content">
      <section class="hero section">
        <div class="container">
          <div class="hero-copy reveal">
            <p class="badge"><span class="dot" aria-hidden="true"></span> 作品 B</p>
            <h1 class="hero-title">待辦清單 Web App</h1>
            <p class="hero-subtitle">
              新增、完成、編輯、刪除；篩選「全部／進行中／已完成」；依建立時間排序；資料儲存在
              <strong>LocalStorage</strong>，重新整理不遺失。
            </p>
            <div class="hero-cta">
              <a class="btn btn-primary" href="#app">開始使用</a>
              <a class="btn btn-ghost" href="index.html#projects">回到作品</a>
            </div>
          </div>
        </div>
      </section>

      <section class="section" id="app">
        <div class="container todo-wrap">
          <header class="section-head reveal">
            <h2 class="section-title">我的待辦</h2>
            <p class="section-desc">
              按「新增」加入項目；點文字可編輯；勾選表示完成；可清除所有已完成項目。
            </p>
          </header>

          <div class="panel reveal">
            <form class="todo-form" id="todo-form" autocomplete="off">
              <input
                class="todo-input"
                id="todo-input"
                type="text"
                maxlength="200"
                placeholder="輸入待辦事項…"
                aria-label="新待辦內容"
              />
              <button class="btn btn-primary" type="submit">新增</button>
            </form>

            <div class="todo-toolbar">
              <div class="todo-filters" role="group" aria-label="篩選">
                <button type="button" data-filter="all" class="is-on">全部</button>
                <button type="button" data-filter="active">進行中</button>
                <button type="button" data-filter="completed">已完成</button>
              </div>
              <div class="todo-sort">
                <label for="todo-sort">排序</label>
                <select id="todo-sort" aria-label="依建立時間排序">
                  <option value="desc">新 → 舊</option>
                  <option value="asc">舊 → 新</option>
                </select>
              </div>
            </div>

            <button type="button" class="btn btn-ghost" id="todo-clear-done" style="margin-bottom: 12px">
              清除已完成
            </button>

            <ul class="todo-list" id="todo-list" aria-live="polite"></ul>
            <div class="todo-empty" id="todo-empty" hidden>
              <p id="todo-empty-msg"></p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="muted">© <span data-year></span> 你的名字 · 作品 B 待辦清單</p>
        <p class="muted"><a class="link" href="index.html">回首頁</a></p>
      </div>
    </footer>

    <script>
      (() => {
        const STORAGE_KEY = "portfolio_todo_b_v1";
        const form = document.getElementById("todo-form");
        const input = document.getElementById("todo-input");
        const listEl = document.getElementById("todo-list");
        const emptyEl = document.getElementById("todo-empty");
        const emptyMsg = document.getElementById("todo-empty-msg");
        const sortEl = document.getElementById("todo-sort");
        const clearDoneBtn = document.getElementById("todo-clear-done");

        let items = [];
        let filter = "all";

        const load = () => {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            items = raw ? JSON.parse(raw) : [];
            if (!Array.isArray(items)) items = [];
          } catch {
            items = [];
          }
        };

        const save = () => {
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
          } catch {
            /* ignore */
          }
        };

        const uid = () =>
          `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;

        const filtered = () => {
          let out = items.slice();
          if (filter === "active") out = out.filter((x) => !x.done);
          if (filter === "completed") out = out.filter((x) => x.done);
          const dir = sortEl.value === "asc" ? 1 : -1;
          out.sort((a, b) => (a.createdAt - b.createdAt) * dir);
          return out;
        };

        const render = () => {
          const rows = filtered();
          listEl.innerHTML = "";

          if (rows.length === 0) {
            emptyEl.hidden = false;
            const hasAny = items.length > 0;
            emptyMsg.innerHTML = hasAny
              ? "目前篩選下<strong>沒有待辦</strong>，可切換「全部」或新增一筆。"
              : "尚無待辦，<strong>在上方輸入並按新增</strong>開始。";
            return;
          }

          emptyEl.hidden = true;
          rows.forEach((item) => {
            const li = document.createElement("li");
            li.className = "todo-item" + (item.done ? " done" : "");
            li.dataset.id = item.id;

            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.checked = item.done;
            cb.setAttribute("aria-label", "標記完成");
            cb.addEventListener("change", () => {
              item.done = cb.checked;
              save();
              render();
            });

            const span = document.createElement("span");
            span.className = "todo-text";
            span.textContent = item.text;
            span.title = "雙擊編輯";
            span.addEventListener("dblclick", () => {
              const nv = window.prompt("編輯待辦：", item.text);
              if (nv == null) return;
              const t = nv.trim();
              if (!t) return;
              item.text = t.slice(0, 200);
              save();
              render();
            });

            const del = document.createElement("button");
            del.type = "button";
            del.className = "todo-del";
            del.textContent = "刪除";
            del.addEventListener("click", () => {
              items = items.filter((x) => x.id !== item.id);
              save();
              render();
            });

            li.appendChild(cb);
            li.appendChild(span);
            li.appendChild(del);
            listEl.appendChild(li);
          });
        };

        document.querySelectorAll(".todo-filters button").forEach((btn) => {
          btn.addEventListener("click", () => {
            filter = btn.getAttribute("data-filter") || "all";
            document.querySelectorAll(".todo-filters button").forEach((b) =>
              b.classList.toggle("is-on", b === btn)
            );
            render();
          });
        });

        sortEl.addEventListener("change", () => render());

        clearDoneBtn.addEventListener("click", () => {
          const n = items.filter((x) => x.done).length;
          if (n === 0) return;
          if (!window.confirm(`確定清除 ${n} 筆已完成？`)) return;
          items = items.filter((x) => !x.done);
          save();
          render();
        });

        form.addEventListener("submit", (e) => {
          e.preventDefault();
          const t = input.value.trim();
          if (!t) return;
          items.push({
            id: uid(),
            text: t.slice(0, 200),
            done: false,
            createdAt: Date.now(),
          });
          input.value = "";
          save();
          render();
          input.focus();
        });

        load();
        render();
      })();
    </script>
  </body>
</html>
