    <script>
      let pyodide = null;

      async function initPyodide() {
        if (!pyodide) {
          try {
            console.log('Loading Pyodide...');
            pyodide = await loadPyodide({
              indexURL: "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/"
            });
            console.log('Pyodide loaded successfully');
          } catch (error) {
            console.error('Failed to load Pyodide:', error);
            alert('無法載入Pyodide，請檢查網路連線或稍後再試。\n錯誤詳情：' + error.message);
            return null;
          }
        }
        return pyodide;
      }

      async function loadGame() {
        const container = document.getElementById('game-container');
        const button = document.querySelector('.hero-cta .btn-primary');

        // Show loading
        container.innerHTML = '<p>載入中...</p>';
        container.style.display = 'block';
        button.textContent = '載入中...';
        button.disabled = true;

        try {
          const pyodideInstance = await initPyodide();
          if (!pyodideInstance) return;

          console.log('Loading Minesweeper game...');

          // Embedded Python code for Minesweeper
          const pythonCode = `import random
import js  # type: ignore  # Pyodide specific import for browser interaction
from collections import deque

# 遊戲難度設定：列數 (r), 行數 (c), 地雷數 (m)
diffs = {
    'easy': {'r': 9, 'c': 9, 'm': 10},
    'medium': {'r': 16, 'c': 16, 'm': 40},
    'hard': {'r': 16, 'c': 30, 'm': 99}
}

class Cell:
    def __init__(self, index, row, col):
        self.index = index          # 格子編號 (0 ~ N-1)
        self.row = row              # 列
        self.col = col              # 行
        self.isMine = False         # 是否是地雷
        self.revealed = False       # 是否已被翻開
        self.flagged = False        # 是否被插旗
        self.adjacent = 0           # 周圍有多少顆地雷

class MinesweeperGame:
    def __init__(self):
        self.rows = 9
        self.cols = 9
        self.mines = 10
        self.cells = []             # 儲存所有格子的清單
        self.started = False        # 遊戲是否已開始
        self.gameOver = False       # 遊戲是否結束
        self.flags = 0              # 已使用的旗幟數量
        self.revealedCount = 0      # 已翻開的格子數量
        self.init_grid()

    def init_grid(self):
        # 重置所有狀態
        # 根據行列數建立空白的格子列表
        self.cells = [Cell(i, i // self.cols, i % self.cols) for i in range(self.rows * self.cols)]
        self.started = False
        self.gameOver = False
        self.flags = 0
        self.revealedCount = 0

    def set_difficulty(self, difficulty):
        if difficulty in diffs:
            settings = diffs[difficulty]
            self.rows = settings['r']
            self.cols = settings['c']
            self.mines = settings['m']
            self.init_grid()

    def place_mines(self, first_index=-1):
        # 隨機佈置地雷 排除玩家第一次點擊的位置
        available = [i for i in range(len(self.cells)) if i != first_index]
        random.shuffle(available)

        for idx in available[:self.mines]:
            self.cells[idx].isMine = True

        for cell in self.cells:
            if cell.isMine:
                continue
            # 計算鄰居中有多少是地雷
            cell.adjacent = sum(1 for n in self.neighbors(cell.row, cell.col) if self.cells[n].isMine)

    def neighbors(self, r, c):
        # 周圍鄰居
        arr = []
        for dr in (-1, 0, 1):
            for dc in (-1, 0, 1):
                if dr == 0 and dc == 0: continue # 跳過自己
                nr, nc = r + dr, c + dc
                # 檢查邊界，確保沒有超出網格範圍
                if 0 <= nr < self.rows and 0 <= nc < self.cols:
                    arr.append(nr * self.cols + nc)
        return arr

    def reveal(self, index):
        # 點擊格子時的邏輯
        if self.gameOver: return
        cell = self.cells[index]

        # 已插旗或已翻開
        if cell.flagged or cell.revealed: return

        # 確保首點不死
        if not self.started:
            self.place_mines(index)
            self.started = True

        # 遊戲結束
        if cell.isMine:
            cell.revealed = True
            self.gameOver = True
            self.reveal_all() # 顯示所有地雷
            return

        # 如果是空白 自動翻開周圍
        # 使用 deque 進行 BFS
        to_visit = deque([index])
        while to_visit:
            i = to_visit.popleft()
            c = self.cells[i]
            if c.revealed or c.flagged: continue

            c.revealed = True
            self.revealedCount += 1

            # 如果周圍地雷數是 0，將鄰居加入待翻開清單
            if c.adjacent == 0:
                for n in self.neighbors(c.row, c.col):
                    if not self.cells[n].revealed and not self.cells[n].isMine:
                        to_visit.append(n)

        # 檢查勝利條件：所有非地雷格子都已翻開
        if self.revealedCount >= len(self.cells) - self.mines:
            self.gameOver = True
            self.reveal_all() # 勝利時通常也會顯示全圖

    def flag(self, index):
        if self.gameOver: return
        cell = self.cells[index]
        if cell.revealed: return # 已翻開的不能插旗

        cell.flagged = not cell.flagged
        self.flags += 1 if cell.flagged else -1

    def reveal_all(self):
        for cell in self.cells:
            cell.revealed = True
        self.gameOver = True

    def get_board_html(self):
        html = f'<div class="minesweeper-board" style="grid-template-columns: repeat({self.cols}, 30px);">'
        for cell in self.cells:
            cell_class = 'cell'
            content = ''
            if cell.revealed:
                if cell.isMine:
                    cell_class += ' mine'
                    content = '💣'
                else:
                    if cell.adjacent > 0:
                        content = str(cell.adjacent)
                        cell_class += f' number-{cell.adjacent}'
                    else:
                        cell_class += ' empty'
            elif cell.flagged:
                cell_class += ' flag'
                content = '🚩'

            html += f'<div class="{cell_class}" data-index="{cell.index}" onclick="handleMinesweeperClick({cell.index})" oncontextmenu="handleMinesweeperRightClick({cell.index}); return false;">{content}</div>'
        html += '</div>'
        return html

    def get_game_status(self):
        if self.gameOver:
            if any(cell.isMine and cell.revealed for cell in self.cells):
                return '遊戲結束！你踩到地雷了！'
            else:
                return '恭喜！你贏了！'
        else:
            remaining_mines = self.mines - self.flags
            return f'進行中 - 剩餘地雷: {remaining_mines}'

# Global game instance
game = None

def init_minesweeper(difficulty='easy'):
    global game
    game = MinesweeperGame()
    game.set_difficulty(difficulty)
    return game.get_board_html()

def handle_click(index):
    global game
    if not game:
        return init_minesweeper()

    game.reveal(index)
    return game.get_board_html()

def handle_flag(index):
    global game
    if not game:
        return init_minesweeper()

    game.flag(index)
    return game.get_board_html()

def get_game_status():
    global game
    if game:
        return game.get_game_status()
    return "遊戲未初始化"

def restart_game(difficulty='easy'):
    global game
    game = MinesweeperGame()
    game.set_difficulty(difficulty)
    return game.get_board_html()

# Add CSS styles
css = '''
<style>
.minesweeper-board {
    display: grid;
    gap: 2px;
    background: #e5e5e5;
    padding: 8px;
    border-radius: 8px;
    margin: 0 auto;
    max-width: fit-content;
}
.cell {
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    background: #9aa7b2;
    color: #fff;
    border-radius: 4px;
    font-size: 14px;
}
.cell:hover {
    background: #8a97a2;
}
.cell.revealed {
    background: #e7eef2;
    color: #000;
    cursor: default;
}
.cell.mine {
    background: #c0392b;
    color: #fff;
}
.cell.flag {
    background: #f39c12;
    color: #fff;
}
.cell.empty {
    background: #e7eef2;
}
.cell.number-1 { color: blue; }
.cell.number-2 { color: green; }
.cell.number-3 { color: red; }
.cell.number-4 { color: purple; }
.cell.number-5 { color: maroon; }
.cell.number-6 { color: turquoise; }
.cell.number-7 { color: black; }
.cell.number-8 { color: gray; }

.game-controls {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.game-status {
    margin-left: 20px;
    font-weight: bold;
    min-height: 24px;
}

.difficulty-selector {
    display: flex;
    align-items: center;
    gap: 8px;
}

@media (max-width: 600px) {
    .cell {
        width: 28px;
        height: 28px;
        font-size: 12px;
    }
    .minesweeper-board {
        gap: 1px;
        padding: 6px;
    }
}
</style>
'''

js.document.head.insertAdjacentHTML('beforeend', css)`;

          // Run the game
          await pyodideInstance.runPythonAsync(pythonCode);
          console.log('Minesweeper game initialized successfully');

          // Get the initial game HTML
          const difficulty = document.getElementById('difficulty').value;
          const initialHtml = pyodideInstance.runPython(`init_minesweeper('${difficulty}')`);
          container.innerHTML = '<h4>踩地雷</h4>' + initialHtml;

          // Update status
          updateGameStatus();

          button.textContent = '重新開始';
          button.disabled = false;

        } catch (error) {
          console.error('Error loading game:', error);
          const errorMessage = error.message || '未知錯誤';
          container.innerHTML = `<p>載入遊戲時發生錯誤：${errorMessage}<br>請檢查網路連線或重新整理頁面再試。</p>`;
          button.textContent = '開始遊戲';
          button.disabled = false;
        }
      }

      // Game handler
      function handleMinesweeperClick(index) {
        if (pyodide) {
          try {
            const result = pyodide.runPython(`handle_click(${index})`);
            const container = document.getElementById('game-container');
            container.innerHTML = '<h4>踩地雷</h4>' + result;
            updateGameStatus();
          } catch (error) {
            console.error('Error handling click:', error);
            alert('遊戲操作出錯：' + error.message);
          }
        }
      }

      // Right-click handler for flagging
      function handleMinesweeperRightClick(index) {
        if (pyodide) {
          try {
            const result = pyodide.runPython(`handle_flag(${index})`);
            const container = document.getElementById('game-container');
            container.innerHTML = '<h4>踩地雷</h4>' + result;
            updateGameStatus();
          } catch (error) {
            console.error('Error handling flag:', error);
            alert('插旗操作出錯：' + error.message);
          }
        }
      }

      // Update game status
      function updateGameStatus() {
        if (pyodide) {
          try {
            const status = pyodide.runPython('get_game_status()');
            document.getElementById('game-status').textContent = status;
          } catch (error) {
            console.error('Error getting game status:', error);
          }
        }
      }

      // Restart game handler
      function restartGame() {
        if (pyodide) {
          try {
            const difficulty = document.getElementById('difficulty').value;
            const result = pyodide.runPython(`restart_game('${difficulty}')`);
            const container = document.getElementById('game-container');
            container.innerHTML = '<h4>踩地雷</h4>' + result;
            updateGameStatus();
          } catch (error) {
            console.error('Error restarting game:', error);
            alert('重新開始遊戲出錯：' + error.message);
          }
        }
      }

      // Initialize year
      document.getElementById('year').textContent = new Date().getFullYear();
    </script>
